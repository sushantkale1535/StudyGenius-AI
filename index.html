
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>StudyGenius AI</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      min-height:100vh;

      background:
      linear-gradient(
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.75)
      ),

      url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1400&auto=format&fit=crop')
      center/cover no-repeat;

      display:flex;
      align-items:center;
      justify-content:center;

      color:white;
    }

    .hero{

      width:100%;
      max-width:1100px;

      padding:40px;
    }

    .badge{

      display:inline-flex;
      align-items:center;
      gap:10px;

      padding:10px 18px;

      border-radius:999px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      border:1px solid rgba(255,255,255,0.1);

      margin-bottom:28px;

      font-size:14px;
      font-weight:600;
    }

    h1{

      font-size:6rem;

      line-height:1;

      font-weight:800;

      color:#ffe082;

      margin-bottom:20px;
    }

    p{

      font-size:1.4rem;

      color:rgba(255,255,255,0.85);

      max-width:650px;

      line-height:1.6;

      margin-bottom:40px;
    }

    .hero-btn{

      height:60px;

      padding:0 32px;

      border:none;

      border-radius:999px;

      background:white;

      color:#111827;

      font-size:1rem;

      font-weight:700;

      cursor:pointer;

      transition:0.3s;

      display:inline-flex;
      align-items:center;
      gap:12px;
    }

    .hero-btn:hover{

      transform:translateY(-3px);

      background:#f8fafc;
    }

    @media(max-width:768px){

      h1{
        font-size:4rem;
      }

      p{
        font-size:1.1rem;
      }

    }

  </style>

</head>

<body>

  <section class="hero">

    <div class="badge">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      AI Study Assistant
    </div>

    <h1>
      StudyGenius
    </h1>

    <p>
      AI-powered flashcards, quizzes,
      and summaries from your notes.
    </p>

    <button
      class="hero-btn"
      onclick="window.location.href='auth.html'"
    >

      <i class="fa-solid fa-arrow-right"></i>

      Get Started

    </button>

  </section>

</body>
</html>
